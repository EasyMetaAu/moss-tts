version: "3.9"

x-common-env: &common-env
  CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
  HF_HOME: /hf_cache
  MAX_SEGMENT_CHARS: ${MAX_SEGMENT_CHARS:-500}

services:
  # ─────────────────────────────────────────────────────────
  # Profile: nano  (MOSS-TTS-Nano ~0.1B, 48kHz stereo)
  # Start: docker compose --profile nano up -d
  # ─────────────────────────────────────────────────────────
  moss-nano:
    image: moss-tts-nano:latest
    profiles: ["nano"]
    container_name: moss-tts-nano
    restart: unless-stopped
    ports:
      - "${NANO_PORT:-6006}:18083"
    volumes:
      - ${VOICES_DIR:-./voices}:/app/custom_voices:ro
    environment:
      <<: *common-env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ─────────────────────────────────────────────────────────
  # Profile: local  (MOSS-TTS-Local-Transformer 1.7B, 24kHz)
  # Start: docker compose --profile local up -d --build
  # Requires: MODEL_WEIGHTS_DIR pointing to downloaded weights
  # ─────────────────────────────────────────────────────────
  moss-local:
    build:
      context: ./services/local
      dockerfile: Dockerfile
    profiles: ["local"]
    container_name: moss-tts-local
    restart: unless-stopped
    ports:
      - "${LOCAL_PORT:-6007}:6007"
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/hf_cache:ro
      - ${VOICES_DIR:-./voices}:/app/voices:ro
      - ${MODEL_WEIGHTS_DIR:-/home/lukin/models}:/models:ro
    environment:
      <<: *common-env
      PORT: "6007"
      MODEL_PATH: "/models/MOSS-TTS-Local-Transformer"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ─────────────────────────────────────────────────────────
  # Profile: realtime  (MOSS-TTS-Realtime 1.7B, low-latency)
  # Start: docker compose --profile realtime up -d --build
  # ─────────────────────────────────────────────────────────
  moss-realtime:
    build:
      context: ./services/realtime
      dockerfile: Dockerfile
    profiles: ["realtime"]
    container_name: moss-tts-realtime
    restart: unless-stopped
    ports:
      - "${REALTIME_PORT:-6008}:6008"
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/hf_cache:ro
      - ${VOICES_DIR:-./voices}:/app/voices:ro
      - ${MODEL_WEIGHTS_DIR:-/home/lukin/models}:/models:ro
    environment:
      <<: *common-env
      PORT: "6008"
      MODEL_PATH: "/models/MOSS-TTS-Realtime"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ─────────────────────────────────────────────────────────
  # Profile: local-gguf  (MOSS-TTS-Delay Q4_K_M via llama.cpp first-class + ONNX tokenizer)
  # Measured VRAM: ~5.1GB backbone on GPU (vs ~12.7GB for `local` bf16 profile)
  # ONNX audio tokenizer runs on CPU (avoids cuDNN requirement)
  # Start: docker compose --profile local-gguf up -d --build
  # Requires:
  #   MODEL_WEIGHTS_DIR/MOSS-TTS-GGUF/first_class/MOSS_TTS_FIRST_CLASS_Q4_K_M.gguf  (4.9GB)
  #   MODEL_WEIGHTS_DIR/MOSS-TTS-GGUF/tokenizer/{tokenizer,vocab,merges}.json
  #   MODEL_WEIGHTS_DIR/MOSS-Audio-Tokenizer-ONNX/{encoder,decoder}.{onnx,data}  (~14GB total)
  # ─────────────────────────────────────────────────────────
  moss-local-gguf:
    build:
      context: ./services/local-gguf
      dockerfile: Dockerfile
      args:
        CUDA_ARCHS: "${CUDA_ARCHS:-86}"
    profiles: ["local-gguf"]
    container_name: moss-tts-local-gguf
    restart: unless-stopped
    ports:
      - "${LOCAL_GGUF_PORT:-6009}:6009"
    volumes:
      - ${VOICES_DIR:-./voices}:/app/voices:ro
      - ${MODEL_WEIGHTS_DIR:-/home/lukin/models}:/models:ro
    environment:
      <<: *common-env
      PORT: "6009"
      MODEL_GGUF: "/models/MOSS-TTS-GGUF/first_class/MOSS_TTS_FIRST_CLASS_Q4_K_M.gguf"
      TOKENIZER_DIR: "/models/MOSS-TTS-GGUF/tokenizer"
      ONNX_ENCODER: "/models/MOSS-Audio-Tokenizer-ONNX/encoder.onnx"
      ONNX_DECODER: "/models/MOSS-Audio-Tokenizer-ONNX/decoder.onnx"
      N_GPU_LAYERS: "-1"
      AUDIO_DECODER_CPU: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
